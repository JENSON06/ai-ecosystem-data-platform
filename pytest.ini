[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Short traceback for cleaner output
addopts = -v --tb=short

# Suppress noisy logs during test runs
log_cli = false
log_level = WARNING

# Mark slow Spark tests so they can be skipped with -m "not spark"
markers =
    spark: tests that start a local SparkSession (slower)
